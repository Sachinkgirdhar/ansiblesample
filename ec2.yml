---
- hosts: localhost
  connection: local

  collections:
    - amazon.aws

  vars:
    vpc_name: valarrr
    vpc_cidr: 10.10.1.0/24

  tasks:

    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ region }}"
        state: present
        tags:
          deploymentID: "{{ deploymentID }}"
      register: vpc

    - name: Create subnet
      amazon.aws.ec2_vpc_subnet:
        state: present
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ subnet_cidr }}"
        region: "{{ region }}"
        tags:
          Name: "{{ vpc_name }}"
          deploymentID: "{{ deploymentID }}"
      register: subnet

    - name: Create ENI
      amazon.aws.ec2_eni:
        private_ip_address: "{{ private_ip }}"
        subnet_id: "{{ subnet.subnet.id }}"
        region: "{{ region }}"
        state: present
      register: eni

    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags:
          deploymentID: "{{ deploymentID }}"
      register: igw

    - name: Create route table
      ansible.builtin.command:
        cmd: >
          aws ec2 create-route-table
          --vpc-id {{ vpc.vpc.id }}
          --region {{ region }}
          --query 'RouteTable.RouteTableId'
          --output text
      register: rt

    - name: Associate route table with subnet
      ansible.builtin.command:
        cmd: >
          aws ec2 associate-route-table
          --route-table-id {{ rt.stdout | trim }}
          --subnet-id {{ subnet.subnet.id }}
          --region {{ region }}

    - name: Add IGW route to route table
      ansible.builtin.command:
        cmd: >
          aws ec2 create-route
          --route-table-id {{ rt.stdout | trim }}
          --destination-cidr-block 0.0.0.0/0
          --gateway-id {{ igw.gateway_id }}
          --region {{ region }}

    - name: Tag route table
      ansible.builtin.command:
        cmd: >
          aws ec2 create-tags
          --resources {{ rt.stdout | trim }}
          --tags Key=Name,Value={{ vpc_name }}-rt Key=deploymentID,Value={{ deploymentID }}
          --region {{ region }}

    - name: Create security group allowing ICMP and SSH
      amazon.aws.ec2_security_group:
        name: "{{ vpc_name }}-sg"
        description: "Allow ICMP ping and SSH for MID server connectivity"
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: icmp
            from_port: -1
            to_port: -1
            cidr_ip: 0.0.0.0/0
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: 0.0.0.0/0
        tags:
          Name: "{{ vpc_name }}-sg"
          deploymentID: "{{ deploymentID }}"
      register: sg

    - name: Attach security group to ENI
      amazon.aws.ec2_eni:
        eni_id: "{{ eni.interface.id }}"
        region: "{{ region }}"
        security_groups:
          - "{{ sg.group_id }}"

    - name: Create EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ instance_name }}"
        instance_type: t2.micro
        image_id: "{{ image_id }}"
        state: present
        region: "{{ region }}"
        key_name: "{{ key }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        network:
          assign_public_ip: yes
          interfaces:
            - id: "{{ eni.interface.id }}"
        wait: yes
        wait_timeout: 500
        tags:
          deploymentID: "{{ deploymentID }}"
      register: vm

    - debug:
        var: vm

    - name: Wait for EC2 instance to be running
      amazon.aws.ec2_instance_info:
        instance_ids: "{{ vm.instance_ids }}"
        region: "{{ region }}"
      register: ec2_info
      until: ec2_info.instances[0].state.name == 'running'
      retries: 30
      delay: 10

    - name: Allocate and associate Elastic IP
      amazon.aws.ec2_eip:
        region: "{{ region }}"
        device_id: "{{ vm.instances[0].instance_id }}"
        state: present
        tags:
          deploymentID: "{{ deploymentID }}"
